<div style="position: relative;">
  <div id="map" style="height: 500px;"></div>

  @if (infoDistancia) {
    <div style="position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">
      <strong>Resultado:</strong><br>
      {{ infoDistancia }}
      <br>
      <button (click)="resetMap()" style="margin-top: 5px; cursor: pointer;">Limpiar</button>
    </div>
  }
</div>
<router-outlet />
